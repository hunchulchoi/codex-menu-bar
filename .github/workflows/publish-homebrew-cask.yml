name: Publish Homebrew Cask

on:
  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g., v1.0.8)'
        required: true
        default: 'v1.0.8'

permissions:
  contents: read

jobs:
  resolve-tag:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Get Tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(curl -fsSL -H "Authorization: Bearer ${{ github.token }}" https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  publish:
    needs: resolve-tag
    uses: choihunchul/github--actions/.github/workflows/publish-homebrew-cask.yml@main
    with:
      tap-repo: 'choihunchul/homebrew-tap'
      cask-name: 'codex-menu-bar'
      name: 'Codex Menu Bar'
      desc: 'Local Codex, Cursor, and Antigravity plugin macOS companion app'
      homepage: 'https://github.com/choihunchul/codex-menu-bar'
      app-name: 'CodexMenuBar.app'
      asset-name: 'CodexMenuBar.dmg'
      tag: ${{ needs.resolve-tag.outputs.tag }}
      verify-tag: false
      zap-trash: '~/.codex-menu-bar ~/Library/Application?Support/CodexMenuBar'
      release-repo: 'choihunchul/codex-menu-bar'
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
